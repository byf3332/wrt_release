name: Build AX6 libatomic1 IPK

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-libatomic1:
    runs-on: ubuntu-24.04

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare source and config
        run: ./build.sh redmi_ax6_libwrt debug

      - name: Build libatomic1 ipk only
        run: |
          cd libwrt
          sed -i '/^CONFIG_PACKAGE_libatomic[0-9]*[= ]/d' .config
          echo 'CONFIG_PACKAGE_libatomic=m' >> .config
          make defconfig
          grep -E '^CONFIG_PACKAGE_libatomic=' .config
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s
          make package/libs/toolchain/compile -j$(nproc) V=s
          mkdir -p ../ipk-out
          find bin -type f \( -name 'libatomic*.ipk' -o -name 'libatomic1*.ipk' \) -print -exec cp -f {} ../ipk-out/ \;
          ls -lh ../ipk-out/
          test -n "$(find ../ipk-out -type f -name '*.ipk' -print -quit)"
          
      - name: Upload libatomic1 ipk
        uses: actions/upload-artifact@v6
        with:
          name: redmi_ax6_libwrt_libatomic1_ipk
          path: ./ipk-out/*.ipk
